services:
  database:
    image: ${DOCKER_HUB_MIRROR:-}postgres:17
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks: [app]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 5s
      retries: 10

  redis:
    image: ${DOCKER_HUB_MIRROR:-}redis:7
    ports: ["6379:6379"]
    networks: [app]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 5s
      retries: 10

  worker:
    build:
      context: ../
      dockerfile: django/Dockerfile
      args:
        DOCKER_HUB_MIRROR: ${DOCKER_HUB_MIRROR:-}
    image: django:local
    pull_policy: never
    command: uv run celery -A config.celery worker --loglevel=info
    environment:
      POSTGRES_HOST: database
      REDIS_URI: redis://redis:6379/0
    env_file: [./.env]
    depends_on:
      database: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [app]
    restart: always

networks:
  app:
    name: app

volumes:
  postgres_data:
